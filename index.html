<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>蓝眼泪模拟器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="ocean"></canvas>

  <div class="panel">
    <div class="title">蓝眼泪模拟器</div>
    <div class="status" id="status">点击按钮后，晃动手机触发蓝色荧光。</div>
    <button id="enableBtn">启用运动感应</button>
    <div class="hint">
      也可以用手指划过屏幕制造发光轨迹。电脑端可用鼠标拖动测试。
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
