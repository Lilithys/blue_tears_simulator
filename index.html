<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>蓝眼泪模拟器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="ocean"></canvas>

  <div class="panel">
    <div class="eyebrow">Blue Tears / Liquid Vessel</div>
    <div class="title">蓝眼泪模拟器 v2</div>
    <div class="status" id="status">拖动屏幕可直接搅动液体。手机上启用传感器后，可用倾斜和晃动触发撞壁发光。</div>
    <button id="enableBtn">启用运动感应</button>
    <div class="hint">
      液面会跟随倾斜变化，强烈晃动会让瓶壁、底部和液面边缘出现蓝色荧光余辉。
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
